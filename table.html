<!DOCTYPE html>
<html lang="zh-Hang-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        .tb1 {
            width: 1000px;
            border: 4px solid #00BB00;
        }

        .tb2 {
            background-color: #E8FFF5;
            font-style: oblique;
        }

        td,
        th {
            border: 1px solid #00b365;
            text-align: center;
        }

        .bor1 {
            border: 3px solid blue;
            border-radius: 10px;
            padding: 10px;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .th1 {
            background-color: #96FED1;
            font-family: 標楷體;
        }

        tbody tr:nth-child(2n) {
            background-color: #FFFFCE;
        }

        tbody tr:nth-child(2n+1) {
            background-color: #FFF4C1;
        }

        tbody tr:hover {
            color: #9393FF
        }
    </style>
</head>

<body>

    <table class="tb1 th1 tb2">
        <caption class="bor1">
            <span>表格練習</span>
        </caption>
        <thead>
            <tr>
                <th>一</th>
                <th>二</th>
                <th>三</th>
                <th>四</th>
                <th>五</th>
            </tr>
            <tr>
                <th colspan="2">六</th>
                <th>七</th>
                <th colspan="2">八</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td rowspan="5">0</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
                <td>7</td>
                <td>8</td>
            </tr>
            <tr>
                <td>9</td>
                <td>10</td>
                <td>11</td>
                <td>12</td>
            </tr>
            <tr>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
            </tr>
            <tr>
                <td>17</td>
                <td>18</td>
                <td>19</td>
                <td>20</td>
            </tr>
            <tr>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
            </tr>
            <tr>
                <td>26</td>
                <td>27</td>
                <td>28</td>
                <td>29</td>
                <td>30</td>
            </tr>
            <tr>
                <td>31</td>
                <td>32</td>
                <td>33</td>
                <td>34</td>
                <td>35</td>
            </tr>
            <tr>
                <td>36</td>
                <td>37</td>
                <td>38</td>
                <td>39</td>
                <td>40</td>
            </tr>
            <tr>
                <td>41</td>
                <td>42</td>
                <td>43</td>
                <td>44</td>
                <td>45</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
