<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media_Queries</title>
    <style>
        h1 {
            font-size: 30px;

            @media(max-width:500px),
            print {
                h1 {
                    font-size: 100px;
                    color: blue;
                }
            }
        }
    </style>
</head>

<body>
    <h1>abc123</h1>
</body>

</html>
