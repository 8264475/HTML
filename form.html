<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form元素</title>
    <style>
        .st1 {
            width: 500px;
            border-bottom: 3px outset #FF8000;
            margin: 30px;
            padding-bottom: 10px;
        }

        .st2 {
            width: 500px;
            margin: 30px;
            text-align: center;
        }

        .t1 {
            width: 100px;
            float: left;
            text-align: right;
        }

        fieldset {
            background-color: #FFFAF4;
            width: 550px;
            margin: 30px;
            border-radius: 20px;
            border-color: #FFA042;
            border-style: double;
        }

        legend {
            color: #FF5809;
            margin-left: 100px;
        }

        textarea {
            resize: none;
        }
    </style>
</head>

<body>
    <form action="#" method="post" enctype="multipart/form-data">
        <fieldset>
            <legend>個人資料一</legend>
            <div class="st1">
                <label for="account1" class="t1">姓名:</label><input type="text" id="account1" name="accound"
                    placeholder="guest" size="10" autofocus>
            </div>
            <div class="st1">
                <label for="" class="t1">性別:</label>
                <input type="radio" name="gender" value="male" id="m1"><label for="m1">男</label>
                <input type="radio" name="gender" balue="female" id="">女</label>
            </div>
            <div class="st1">
                <label for="" class="st1">身份證字號:</label>
                <input type="text" name="idcode" maxlength="10" pattern="[a-z,A-Z]{1}[1-2,8-9]\d{8}">
            </div>
            <div class="st1">
                <label for="pwd1" class="t1">密碼:</label><input type="password" id="pwd1" name="pwd" maxlength="6">
            </div>
        </fieldset>
        <fieldset>
            <legend>地址</legend>
            <div class="st1">
                <label for="" class="t1">縣市:</label>
                <select name="add1" multiple>
                    <option value="tpe">台北市</option>
                    <option value="tph">新北市</option>
                    <option value="tyu">桃園市</option>
                    <option placeholder="hsc" selected>新竹市</option>
                </select>
            </div>
            <div class="st1">
                <label for="" class="t1">完整地址:</label>
                <input type="text" name="add2" size="30">
            </div>
        </fieldset>
        <fieldset>
            <legend>個人資料二</legend>
            <div class="st1">
                <label for="" class="t1">照片:
                </label>
                <input type="file" name="file1" multiple>
            </div>
            <div class="st1">
                <label for="" class="st1">Blog:</label>
                <input type="url" name="bloglist" list="urllist">
                <datalist id="urllist">
                    <option value="http://www.google.com">Google</option>
                    <option value="http://www.facebook.com">Facebook</option>
                    <option value="http://www.pchome.com">Pchome</option>
                </datalist>
            </div>
            <div class="st1">
                <label for="" class="t1">興趣:</label>
                <label>
                    <input type="checkbox" name="hobby" value="music" id="">音樂
                </label>
                <label>
                    <input type="checkbox" name="hobby" value="sport" id="">運動
                </label>
                <label>
                    <input type="checkbox" name="hobby" value="reading" id="">閱讀
                </label>
                <label>
                    <input type="checkbox" name="hobby" value="movie" id="">電影
                </label>
            </div>
            <div class="st1">
                <label class="t1" for="">日期:</label>
                <input type="日期" name="日期1">
            </div>
            <div class="st1">
                <label for="comment1" class="t1">意見:</label><textarea name="comment" id="comment1" cols="40"
                    rows="5"></textarea>
            </div>

        </fieldset>
        <div class=st2>
            <input type="submit" value="送出">
            <input type="reset" value="清除">
            </script>
        </div>
    </form>
</body>

</html>
